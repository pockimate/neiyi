<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Intimate Elegance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#DB2777',
                        secondary: '#F472B6',
                        cta: '#CA8A04',
                        background: '#FDF2F8',
                        textPrimary: '#831843'
                    },
                    fontFamily: {
                        display: ['Playfair Display', 'serif'],
                        body: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
        }
        .glass-card-dark {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="font-body bg-background text-textPrimary">
    <nav class="fixed top-4 left-4 right-4 z-50 glass-card-dark rounded-2xl border border-pink-200 shadow-lg">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2">
                <svg class="w-8 h-8 text-primary" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                </svg>
                <span class="font-display text-2xl font-semibold text-primary">Intimate Elegance</span>
            </a>
            <a href="products.html" class="text-sm font-medium hover:text-primary transition-colors">Continue Shopping</a>
        </div>
    </nav>
    <section class="pt-32 pb-20 px-4">
        <div class="max-w-7xl mx-auto">
            <h1 class="font-display text-4xl md:text-5xl font-bold text-primary mb-8">Shopping Cart</h1>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-4" id="cartItems"></div>
                <div class="lg:col-span-1">
                    <div class="glass-card rounded-2xl p-6 border border-pink-200 sticky top-24">
                        <h2 class="font-display text-2xl font-semibold mb-6">Order Summary</h2>
                        <div class="space-y-3 mb-6">
                            <div class="flex justify-between"><span>Subtotal</span><span id="subtotal">0.00</span></div>
                            <div class="flex justify-between"><span>Shipping</span><span class="text-green-600">Free</span></div>
                            <div class="flex justify-between"><span>Tax</span><span id="tax">0.00</span></div>
                            <div class="border-t pt-3 flex justify-between font-semibold text-lg"><span>Total</span><span class="text-primary" id="total">0.00</span></div>
                        </div>
                        <a href="checkout.html" class="block w-full bg-cta hover:bg-yellow-600 text-white py-4 rounded-full font-semibold text-center mb-3">Proceed to Checkout</a>
                        <a href="products.html" class="block w-full border-2 border-primary text-primary hover:bg-primary hover:text-white py-4 rounded-full font-semibold text-center">Continue Shopping</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="js/cart.js"></script>
    <script>
function loadCart(){const cart=JSON.parse(localStorage.getItem('cart')||'[]');const c=document.getElementById('cartItems');if(cart.length===0){c.innerHTML='<div class="glass-card rounded-2xl p-12 border border-pink-200 text-center"><h3 class="font-display text-2xl font-semibold mb-2">Your cart is empty</h3><p class="mb-6">Add some items</p><a href="products.html" class="inline-block bg-cta text-white px-8 py-3 rounded-full font-semibold">Shop Now</a></div>';return;}let sub=0;c.innerHTML=cart.map((item,i)=>{sub+=item.price*item.quantity;return'<div class="glass-card rounded-2xl p-6 border border-pink-200"><div class="flex gap-6"><div class="w-24 h-24 bg-gradient-to-br from-pink-100 to-rose-50 rounded-lg"></div><div class="flex-1"><h3 class="font-display text-xl font-semibold">'+item.name+'</h3><p class="text-sm text-slate-600 mb-2">Size: '+item.size+' | Color: '+item.color+'</p><div class="flex items-center justify-between"><div class="flex items-center space-x-3"><button onclick="updateQuantity('+i+',-1)" class="w-8 h-8 border rounded-lg">-</button><span>'+item.quantity+'</span><button onclick="updateQuantity('+i+',1)" class="w-8 h-8 border rounded-lg">+</button></div><div class="text-right"><p class="font-display text-2xl font-bold text-primary">$'+(item.price*item.quantity).toFixed(2)+'</p><button onclick="removeItem('+i+')" class="text-sm text-red-500">Remove</button></div></div></div></div></div>';}).join('');const tax=sub*0.1;document.getElementById('subtotal').textContent='$'+sub.toFixed(2);document.getElementById('tax').textContent='$'+tax.toFixed(2);document.getElementById('total').textContent='$'+(sub+tax).toFixed(2);}
function updateQuantity(i,c){let cart=JSON.parse(localStorage.getItem('cart')||'[]');cart[i].quantity+=c;if(cart[i].quantity<=0)cart.splice(i,1);localStorage.setItem('cart',JSON.stringify(cart));loadCart();updateCartCount();}
function removeItem(i){let cart=JSON.parse(localStorage.getItem('cart')||'[]');cart.splice(i,1);localStorage.setItem('cart',JSON.stringify(cart));loadCart();updateCartCount();}
loadCart();updateCartCount();
    </script>
</body>
</html>
